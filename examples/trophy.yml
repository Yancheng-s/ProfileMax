name: Generate Trophy SVG

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate trophy SVG
        run: |
          curl -s -o trophy.svg \
            "https://github-profile-trophy.vercel.app/?username=Yancheng-s&theme=dracula&no-frame=true&no-bg=true&row=2&column=4&margin-w=8&margin-h=8"
          mkdir -p assets
          mv trophy.svg assets/
      - name: Commit and push
        run: |
          git add assets/trophy.svg
          git diff --staged --quiet || git commit -m "chore: update trophy SVG"
          git push
